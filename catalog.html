<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardShop - Catalog</title>
    <link rel="stylesheet" href="catalogstyle.css">
</head>

<body>
    <header>
        <a href="index.html" class="logo">MediaCards</a>
        <nav class="nav-menu">
            <a href="cart.html" class="nav-link">Cart</a>
        </nav>
        <a href="cart.html" class="cartcontainer">
            <div class="cart-icon">🛒</div>
            <span class="counter">0</span>
        </a>
    </header>

    <main class="mainbody">
        
        <!-- ================= СЕКЦИЯ: СЛИЗЬ ================= -->
        <section id="slime" class="anime-section">
            <h2 class="anime-title">Rimuru Slime Collection</h2>
            
            <div class="grid-container">
                <!-- Римуру -->
                <div class="productcard">
                    <div class="photo-container">
                        <img src="rimuru.jpg" class="productphoto" alt="Rimuru Tempest">
                    </div>
                    <h3 class="productname">Rimuru Tempest</h3>
                    <div class="pricerate">
                        <span class="price">$19.99</span>
                        <span class="rating">9.9/10</span>
                    </div>
                    <div class="card-actions">
                        <button class="buy-btn">Buy Card</button>
                    </div>
                </div>

                <!-- Бенимару -->
                <div class="productcard">
                    <div class="photo-container">
                        <img src="benimaru.jpg" class="productphoto" alt="Benimaru">
                    </div>
                    <h3 class="productname">Benimaru</h3>
                    <div class="pricerate">
                        <span class="price">$14.99</span>
                        <span class="rating">9.2/10</span>
                    </div>
                    <div class="card-actions">
                        <button class="buy-btn">Buy Card</button>
                    </div>
                </div>

                <!-- Диабло -->
                <div class="productcard">
                    <div class="photo-container">
                        <img src="diablo.jpg" class="productphoto" alt="Diablo">
                    </div>
                    <h3 class="productname">Diablo</h3>
                    <div class="pricerate">
                        <span class="price">$24.99</span>
                        <span class="rating">9.8/10</span>
                    </div>
                    <div class="card-actions">
                        <button class="buy-btn">Buy Card</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- ================= СЕКЦИЯ: НАРУТО ================= -->
        <section id="naruto" class="anime-section">
            <h2 class="anime-title">Naruto Collection</h2>
            
            <div class="grid-container">
                <!-- Наруто -->
                <div class="productcard">
                    <div class="photo-container">
                        <img src="naruto.jpg" class="productphoto" alt="Naruto Uzumaki">
                    </div>
                    <h3 class="productname">Naruto Uzumaki</h3>
                    <div class="pricerate">
                        <span class="price">$22.99</span>
                        <span class="rating">9.7/10</span>
                    </div>
                    <div class="card-actions">
                        <button class="buy-btn">Buy Card</button>
                    </div>
                </div>

                <!-- Саске -->
                <div class="productcard">
                    <div class="photo-container">
                        <img src="sasuke.jpg" class="productphoto" alt="Sasuke Uchiha">
                    </div>
                    <h3 class="productname">Sasuke Uchiha</h3>
                    <div class="pricerate">
                        <span class="price">$25.00</span>
                        <span class="rating">9.6/10</span>
                    </div>
                    <div class="card-actions">
                        <button class="buy-btn">Buy Card</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- ================= СЕКЦИЯ: ONE PIECE ================= -->
        <section id="onepiece" class="anime-section">
            <h2 class="anime-title">One Piece Collection</h2>
            
            <div class="grid-container">
                <!-- Луффи -->
                <div class="productcard">
                    <div class="photo-container">
                        <img src="luffy.jpg" class="productphoto" alt="Monkey D. Luffy">
                    </div>
                    <h3 class="productname">Monkey D. Luffy</h3>
                    <div class="pricerate">
                        <span class="price">$29.99</span>
                        <span class="rating">9.9/10</span>
                    </div>
                    <div class="card-actions">
                        <button class="buy-btn">Buy Card</button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>

</html>
