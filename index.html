<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardShop - Home</title>
    <link rel="stylesheet" href="indexstyle.css">
</head>

<body>
    <header>
        <a href="index.html" class="logo">MediaCards</a>
        <nav class="nav-menu">
            <a href="cart.html" class="nav-link">Cart</a>
        </nav>
        <a href="cart.html" class="cartcontainer">
            <div class="cart-icon">🛒</div>
            <span class="counter">0</span>
        </a>
    </header>

    <main class="mainbody">
        <h1 class="welcome-title">Select Universe</h1>

        <div class="menu-grid">
            <!-- Ведет на catalog.html и прыгает к #slime -->
            <a href="catalog.html#slime" class="menu-card">
                <img src="slimeuni.jpg" alt="Slime Universe">
                <h2>That Time I Got Reincarnated as a Slime</h2>
            </a>

            <a href="catalog.html#naruto" class="menu-card">
                <img src="narutouni.jpg" alt="Naruto Universe">
                <h2>Naruto</h2>
            </a>

            <a href="catalog.html#onepiece" class="menu-card">
                <img src="onepieceuni.jpg" alt="One Piece Universe">
                <h2>One Piece</h2>
            </a>
        </div>
    </main>
</body>

</html>
